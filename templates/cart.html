<!DOCTYPE html>
<html>
<head>
    <title>Cart</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>

<h1 class="title">🛒 Your Cart</h1>

<center>
    <a href="/">
        <button>⬅ Back to Menu</button>
    </a>

    <a href="{{ url_for('clear_cart') }}">
        <button style="background:red;">🗑 Clear Cart</button>
    </a>
</center>

<br>

<div class="menu">

{% if items %}
    {% for item in items %}
    <div class="card">
        <h3>{{ item[1] }}</h3>
        <p>Price: ₹{{ item[2] }}</p>
        <p>Quantity: {{ item[3] }}</p>
        <p class="price">Subtotal: ₹{{ item[2] * item[3] }}</p>

        <a href="{{ url_for('delete_item', item_id=item[0]) }}">
            <button style="background:red;">Delete</button>
        </a>
    </div>
    {% endfor %}
{% else %}
    <h3>No items in cart!</h3>
{% endif %}

</div>

<h2 style="text-align:center; margin-top:30px;">
    Total Amount: ₹{{ total }}
</h2>

</body>
</html>
